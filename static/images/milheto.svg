  <circle cx="49" cy="22" r="2" fill="#A8862A"/>
  <circle cx="53" cy="24" r="2" fill="#A8862A"/>
  <circle cx="48" cy="27" r="2" fill="#A8862A"/>
  <circle cx="52" cy="29" r="2" fill="#A8862A"/>
  <circle cx="50" cy="10" r="1.8" fill="#A8862A"/>
  <circle cx="46" cy="22" r="1.8" fill="#B89530"/>
  <circle cx="54" cy="16" r="1.8" fill="#B89530"/>
  <circle cx="50" cy="32" r="1.5" fill="#A8862A"/>
</svg>
