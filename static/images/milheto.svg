  <!-- Individual seed dots -->
  <circle cx="48" cy="12" r="2" fill="#A8862A"/>
  <circle cx="52" cy="14" r="2" fill="#A8862A"/>
  <circle cx="47" cy="17" r="2" fill="#A8862A"/>
