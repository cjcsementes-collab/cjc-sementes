  <path d="M75 70 Q82 50 80 35 Q78 25 72 22" fill="none" stroke="#1A7A3D" stroke-width="3" stroke-linecap="round"/>
  <!-- Corn cob body -->
  <rect x="36" y="25" width="28" height="55" rx="10" fill="#F5D030"/>
  <!-- Kernel rows -->
  <!-- Row 1 -->
  <circle cx="42" cy="32" r="3" fill="#E8B820"/>
  <circle cx="50" cy="32" r="3" fill="#EDCC30"/>
  <circle cx="58" cy="32" r="3" fill="#E8B820"/>
  <!-- Row 2 -->
  <circle cx="42" cy="40" r="3" fill="#EDCC30"/>
  <circle cx="50" cy="40" r="3" fill="#E8B820"/>
  <circle cx="58" cy="40" r="3" fill="#EDCC30"/>
  <!-- Row 3 -->
  <circle cx="42" cy="48" r="3" fill="#E8B820"/>
  <circle cx="50" cy="48" r="3" fill="#EDCC30"/>
  <circle cx="58" cy="48" r="3" fill="#E8B820"/>
  <!-- Row 4 -->
  <circle cx="42" cy="56" r="3" fill="#EDCC30"/>
  <circle cx="50" cy="56" r="3" fill="#E8B820"/>
  <circle cx="58" cy="56" r="3" fill="#EDCC30"/>
  <!-- Row 5 -->
  <circle cx="42" cy="64" r="3" fill="#E8B820"/>
  <circle cx="50" cy="64" r="3" fill="#EDCC30"/>
  <circle cx="58" cy="64" r="3" fill="#E8B820"/>
  <!-- Row 6 -->
  <circle cx="46" cy="72" r="3" fill="#EDCC30"/>
  <circle cx="54" cy="72" r="3" fill="#E8B820"/>
