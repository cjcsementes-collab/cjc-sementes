  <line x1="53" y1="95" x2="62" y2="18" stroke="#1A7A3D" stroke-width="2" stroke-linecap="round"/>
  <!-- Fanning grass blades -->
  <path d="M50 25 Q45 10 30 5" fill="none" stroke="#1A7A3D" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M50 25 Q55 10 70 5" fill="none" stroke="#1A7A3D" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M38 20 Q28 8 18 8" fill="none" stroke="#24903D" stroke-width="2" stroke-linecap="round"/>
