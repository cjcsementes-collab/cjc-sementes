  <path d="M32 42 Q28 32 38 25 Q50 18 60 25 Q70 32 68 42 Q65 50 60 56 Q55 62 50 60 Q44 58 40 52 Q35 48 32 42 Z" fill="#A0522D" opacity="0.7"/>
  <!-- Bean hilum (eye/scar) -->
