  <!-- Subtle highlight -->
  <ellipse cx="42" cy="35" rx="6" ry="4" fill="#B8673A" opacity="0.4" transform="rotate(-15 42 35)"/>
  <!-- Second bean behind -->
  <path d="M45 60 Q40 52 45 46 Q52 40 60 46 Q68 52 66 60 Q64 68 58 72 Q52 76 48 72 Q44 68 45 60 Z" fill="#7A3B10" stroke="#5C2D0A" stroke-width="1"/>
