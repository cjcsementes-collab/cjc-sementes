  <!-- Shadow -->
  <ellipse cx="52" cy="75" rx="22" ry="6" fill="#2C3E35" opacity="0.15"/>
  <!-- Main bean shape - kidney/classic form -->
  <path d="M28 45 Q22 30 35 22 Q50 15 62 22 Q75 30 72 45 Q70 55 65 62 Q58 72 50 70 Q42 68 38 60 Q32 55 28 45 Z" fill="#8B4513" stroke="#6B3410" stroke-width="1.5"/>
