<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Forage grass: upright clump with seed heads -->
  <!-- Base -->
  <ellipse cx="50" cy="93" rx="18" ry="4" fill="#2C3E35" opacity="0.25"/>
  <!-- Main upright stems -->
  <line x1="50" y1="93" x2="50" y2="20" stroke="#1A7A3D" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="42" y1="93" x2="38" y2="18" stroke="#1A7A3D" stroke-width="2" stroke-linecap="round"/>
  <line x1="58" y1="93" x2="62" y2="18" stroke="#1A7A3D" stroke-width="2" stroke-linecap="round"/>
  <line x1="35" y1="93" x2="28" y2="28" stroke="#24903D" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="65" y1="93" x2="72" y2="28" stroke="#24903D" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Seed heads at tops - feathery -->
  <ellipse cx="50" cy="15" rx="3" ry="7" fill="#A89040" opacity="0.8"/>
  <ellipse cx="38" cy="13" rx="2.5" ry="6" fill="#A89040" opacity="0.8"/>
  <ellipse cx="62" cy="13" rx="2.5" ry="6" fill="#A89040" opacity="0.8"/>
  <ellipse cx="28" cy="23" rx="2" ry="5.5" fill="#B89A48" opacity="0.7"/>
  <ellipse cx="72" cy="23" rx="2" ry="5.5" fill="#B89A48" opacity="0.7"/>
  <!-- Short whiskers on seed heads -->
  <line x1="50" y1="10" x2="48" y2="5" stroke="#A89040" stroke-width="0.8"/>
  <line x1="50" y1="10" x2="52" y2="5" stroke="#A89040" stroke-width="0.8"/>
  <line x1="38" y1="9" x2="35" y2="4" stroke="#A89040" stroke-width="0.8"/>
  <line x1="62" y1="9" x2="65" y2="4" stroke="#A89040" stroke-width="0.8"/>
  <!-- Side leaves -->
  <path d="M46 60 Q32 52 22 55" fill="none" stroke="#1A7A3D" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M54 50 Q68 42 78 45" fill="none" stroke="#24903D" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M48 75 Q36 70 28 74" fill="none" stroke="#1A7A3D" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M52 68 Q64 62 74 66" fill="none" stroke="#24903D" stroke-width="1.5" stroke-linecap="round"/>
</svg>
