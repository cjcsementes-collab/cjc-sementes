<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Jack bean: large curved pod with big seeds -->
  <!-- Stem -->
  <path d="M75 15 Q65 20 55 30" fill="none" stroke="#1A7A3D" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Small leaf -->
  <ellipse cx="72" cy="18" rx="8" ry="4" fill="#1A7A3D" transform="rotate(-40 72 18)"/>
  <!-- Large curved pod -->
  <path d="M20 70 Q15 55 25 40 Q35 28 50 30 Q60 32 65 42 Q70 55 62 68 Q55 78 40 80 Q28 80 20 70 Z" fill="#5A8C3F" stroke="#3D6B2A" stroke-width="2"/>
  <!-- Pod seam -->
  <path d="M22 65 Q30 45 45 35 Q55 32 62 42" fill="none" stroke="#3D6B2A" stroke-width="1.5" opacity="0.7"/>
  <!-- Large seed bumps -->
  <circle cx="32" cy="55" r="8" fill="#6B9E4A" stroke="#5A8C3F" stroke-width="1"/>
  <circle cx="46" cy="48" r="8" fill="#6B9E4A" stroke="#5A8C3F" stroke-width="1"/>
  <circle cx="56" cy="56" r="7" fill="#6B9E4A" stroke="#5A8C3F" stroke-width="1"/>
  <!-- Highlight on pod -->
  <path d="M28 50 Q35 38 48 35" fill="none" stroke="#7AB55A" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <!-- Pod tip -->
  <path d="M20 70 Q18 75 22 78" fill="none" stroke="#4A7A30" stroke-width="2" stroke-linecap="round"/>
</svg>
