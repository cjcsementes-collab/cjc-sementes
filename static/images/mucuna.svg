<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Velvet bean (Mucuna): fuzzy/hairy pod with rounded shape -->
  <!-- Vine stem -->
  <path d="M80 10 Q65 15 55 30 Q48 42 42 50" fill="none" stroke="#1A7A3D" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Small leaf -->
  <ellipse cx="72" cy="18" rx="8" ry="5" fill="#1A7A3D" transform="rotate(-25 72 18)"/>
  <ellipse cx="62" cy="25" rx="7" ry="4" fill="#24903D" transform="rotate(-10 62 25)"/>
  <!-- Fuzzy pod - main shape -->
  <path d="M25 52 Q20 42 30 35 Q42 30 55 38 Q62 44 58 56 Q54 68 42 72 Q30 74 25 65 Z" fill="#8B7355" stroke="#6B5740" stroke-width="1.5"/>
  <!-- Inner pod coloring -->
  <path d="M28 50 Q24 42 33 37 Q42 33 52 40 Q58 44 55 54 Q52 64 42 68 Q32 70 28 62 Z" fill="#9B836A" opacity="0.7"/>
  <!-- Fuzzy hair texture lines -->
  <line x1="28" y1="45" x2="25" y2="42" stroke="#7A6550" stroke-width="0.8"/>
  <line x1="32" y1="38" x2="30" y2="35" stroke="#7A6550" stroke-width="0.8"/>
  <line x1="38" y1="35" x2="37" y2="32" stroke="#7A6550" stroke-width="0.8"/>
  <line x1="45" y1="34" x2="45" y2="31" stroke="#7A6550" stroke-width="0.8"/>
  <line x1="52" y1="38" x2="54" y2="35" stroke="#7A6550" stroke-width="0.8"/>
  <line x1="56" y1="45" x2="59" y2="43" stroke="#7A6550" stroke-width="0.8"/>
  <line x1="56" y1="52" x2="59" y2="51" stroke="#7A6550" stroke-width="0.8"/>
  <line x1="52" y1="60" x2="55" y2="60" stroke="#7A6550" stroke-width="0.8"/>
  <line x1="45" y1="66" x2="46" y2="69" stroke="#7A6550" stroke-width="0.8"/>
  <line x1="36" y1="68" x2="35" y2="71" stroke="#7A6550" stroke-width="0.8"/>
  <line x1="28" y1="62" x2="25" y2="63" stroke="#7A6550" stroke-width="0.8"/>
  <line x1="26" y1="55" x2="23" y2="55" stroke="#7A6550" stroke-width="0.8"/>
  <!-- Pod seam -->
  <path d="M27 56 Q38 42 55 48" fill="none" stroke="#5C4830" stroke-width="1" opacity="0.6"/>
  <!-- Seed bumps -->
  <circle cx="35" cy="50" r="5" fill="#A08E78" stroke="#8B7355" stroke-width="0.8"/>
  <circle cx="46" cy="48" r="5" fill="#A08E78" stroke="#8B7355" stroke-width="0.8"/>
</svg>
