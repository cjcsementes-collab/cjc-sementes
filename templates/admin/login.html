{% extends 'base.html' %}

{% block title %}Login Administrativo - CJC Sementes{% endblock %}

{% block content %}
<section class="container">
    <div class="admin-login-wrapper">
        <div style="text-align: center; margin-bottom: 30px;">
            <i class="fa-solid fa-lock" style="font-size: 2.5rem; color: var(--verde-safra); margin-bottom: 10px;"></i>
            <h2 style="color: var(--grafite-titanio);">Painel CJC</h2>
            <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 5px;">Acesso restrito para administradores</p>
        </div>
        
        <form action="{{ url_for('admin_login') }}" method="POST">
            <div class="form-group">
                <label class="form-label" for="username">Usuário</label>
                <input type="text" name="username" id="username" class="form-input" required placeholder="Digite o usuário">
            </div>
            
            <div class="form-group" style="margin-bottom: 25px;">
                <label class="form-label" for="password">Senha</label>
                <input type="password" name="password" id="password" class="form-input" required placeholder="Digite a senha">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: var(--radius-sm); font-size: 1rem; padding: 10px 15px;">
                Entrar no Painel <i class="fa-solid fa-right-to-bracket" style="margin-left: 8px;"></i>
            </button>
        </form>
        
        <p style="font-size:0.75rem; text-align:center; color:var(--text-muted); margin-top: 20px;">
            Usuário padrão de testes: <strong>admin</strong> / <strong>admin123</strong>
        </p>
    </div>
</section>
{% endblock %}
